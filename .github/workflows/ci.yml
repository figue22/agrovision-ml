name: CI - ML Service

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install flake8
      - run: flake8 src/ tests/ --max-line-length=120 --exclude=__pycache__ --count --show-source --statistics

  build:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      APP_ENV: testing
      APP_PORT: 8000
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      OPENAI_API_KEY: test-key
      MLFLOW_TRACKING_URI: http://localhost:5000
      MODEL_PATH: ./data/models
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --cov=src --cov-report=xml || true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-coverage
          path: coverage.xml

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploy staging - configurar con servidor real"